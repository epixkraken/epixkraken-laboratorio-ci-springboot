name: CI Spring Boot

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout de codigo
      uses: actions/checkout@v3

    # Configura Java 17 requerido por Spring Boot
    - name: Setup JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    # Cumple con: "Build del proyecto con Maven" y "Tests unitarios e integracion"
    - name: Build & Test
      run: mvn clean verify

    # Cumple con: "Construccion de una imagen Docker lista para deploy"
    - name: Build Docker image
      run: docker build -t myapp:latest .
