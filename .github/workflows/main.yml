name: Spring Boot CI

# Este bloque define cuándo se va a ejecutar el pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # La máquina virtual donde se ejecutará
    runs-on: ubuntu-latest

    steps:
    # Paso 1: Descargar tu código del repositorio
    - uses: actions/checkout@v4
    
    # Paso 2: Instalar y configurar Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    # Paso 3: Compilar y correr pruebas con Maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml
